apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-config
  namespace: tokped-sniper
data:
  my.cnf: |
    [mysqld]
    character-set-server = utf8mb4
    collation-server     = utf8mb4_unicode_ci
    wait_timeout         = 28800
    log_warnings         = 0
    bind-address         = 0.0.0.0
