apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mariadb-netpol
  namespace: tokped-sniper
spec:
  podSelector:
    matchLabels:
      app: mariadb
  policyTypes:
    - Ingress
  ingress:
    # Allow bot pods via cluster pod CIDR (k3s default: 10.42.0.0/16)
    - from:
        - ipBlock:
            cidr: 10.42.0.0/16
      ports:
        - port: 3306
